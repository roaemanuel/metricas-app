# ============================================================
# Nginx config para MetricHub
# Guardar como: /etc/nginx/sites-available/metricas
# Luego: sudo ln -s /etc/nginx/sites-available/metricas /etc/nginx/sites-enabled/
# Y:     sudo certbot --nginx -d metrics.tudominio.com
# ============================================================

server {
    listen 80;
    server_name metrics.tudominio.com;

    root /var/www/metricas;
    index index.html;

    # React SPA — todas las rutas van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Seguridad básica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Certbot agrega el bloque HTTPS automáticamente abajo
}
